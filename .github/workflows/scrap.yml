name: Cafe Scrap Bot

on:
  schedule:
    # 한국 시간(KST) 오전 10시 = UTC 오전 1시 (월~금요일만 실행)
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 깃허브 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 세팅하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 도구 최신 버전으로 설치하기
      run: |
        pip install -U requests beautifulsoup4 google-generativeai

    - name: 스크랩 프로그램 실행하기
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      run: python main.py
