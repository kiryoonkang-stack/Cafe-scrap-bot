name: Cafe Scrap Bot

on:
  schedule:
    # 한국 시간(KST) 오전 10시 = UTC 오전 1시
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 깃허브 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 세팅하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 도구 설치하기 (제미나이 AI 도구 추가)
      run: |
        pip install requests beautifulsoup4 google-generativeai

    - name: 카페 스크랩 및 AI 요약 프로그램 실행하기
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py
